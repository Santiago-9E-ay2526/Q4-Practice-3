<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link rel="stylesheet" href="styles.css">

     <!-- BOOTSTRAP -->
     <!-- Latest compiled and minified CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- Latest compiled JavaScript -->

     <!-- GOOGLE FONTS -->

<body>
     
     <div class="container">
          <h2>Game Level</h2>
          <label id="enterLabel">Enter level: </label> <br> 
          <input type="number" id="lvlId" class="form-control mx-auto" min="0" max="3">
          <p id="lvlType"></p>
          
          <button onclick="lvlConfirm()" type="button" class="btn btn-success mt-3">Confirm Level</button>
          <button onclick="window.location.reload()" type="button" class="btn btn-success mt-3">Refresh</button>
     </div>

<script src="main.js"></script>
</body>
